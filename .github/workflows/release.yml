name: Android Release Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Compute version
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEW_CODE=1
          else
            CODE=${LATEST#v}
            NEW_CODE=$((CODE + 1))
          fi
          NEW_NAME="${NEW_CODE}.0"
          echo "code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_CODE" >> $GITHUB_OUTPUT

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/TeacherHub-${{ steps.version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Teacher Hub ${{ steps.version.outputs.tag }}
          files: app/build/outputs/apk/debug/TeacherHub-${{ steps.version.outputs.tag }}.apk
          generate_release_notes: true
